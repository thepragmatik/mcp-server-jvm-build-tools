spring.application.name=@project.name@
# Default: stdio-only. Use --spring.profiles.active=http to enable HTTP.
spring.main.web-application-type=none
spring.ai.mcp.server.name=@project.name@ Server
spring.ai.mcp.server.version=@project.version@
spring.ai.mcp.server.stdio=true
# NOTE: this is essential else your client will barf!
spring.main.banner-mode=off
logging.pattern.console=
logging.level.org.springframework=WARN
# Allow unknown JSON fields in MCP protocol messages: clients may send fields
# (e.g. "extensions") from newer MCP spec revisions that the bundled SDK does
# not yet model. Ignoring them keeps the server forward-compatible.
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Streamable HTTP transport (opt-in via --spring.profiles.active=http) ──
# spring.ai.mcp.server.http=true
# server.port=8080

# ── Actuator health endpoints (available for monitoring) ──
management.endpoints.web.exposure.include=health,info
# Expose detailed health information only to authorized principals. NOTE: Spring
# Security is not on the classpath by default, so no principal is ever authorized
# and health details are hidden from everyone (effectively "never") until you add
# spring-boot-starter-security and configure roles. Set to "always" for
# unauthenticated local debugging (not recommended in production).
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# ── Streamable HTTP transport configuration (2026-07-28 RC: STATELESS) ──
# The MCP Streamable HTTP transport is stateless: no protocol-level sessions, no
# Mcp-Session-Id header, and no SSE-stream resumability (Last-Event-ID / event IDs
# are gone, SEP-2575). This makes the server round-robin / load-balancer friendly
# — any replica can serve any request; cross-call state uses explicit server-minted
# handles (e.g. async build taskId) passed as ordinary tool arguments (SEP-2567).
# CORS origins (comma-separated). Restricted to local origins by default.
# To widen for development, list specific origins, e.g.:
#   mcp.transport.cors.allowed-origins=https://dashboard.example.com
# A wildcard ("*") is honoured for local testing only and should never be used
# in production. Keep this list as narrow as possible.
mcp.transport.cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080
# The following two settings govern the SUPPLEMENTARY build-events telemetry feed
# (/mcp/build-events/stream), NOT the MCP protocol transport. That feed is a
# best-effort, non-resumable firehose retained for dashboards (see
# BuildEventController); it carries no MCP JSON-RPC traffic.
# Build-events stream timeout in milliseconds (default: 30 minutes)
mcp.transport.sse.timeout-ms=1800000
# Maximum number of concurrent build-events subscribers
mcp.transport.sse.max-subscribers=100
# Include timing info in response headers
mcp.transport.include-timing=true

# ==== Tool Authorization and Auditing ====
# Enable tool authorization (default: false). When enabled, MCP clients must
# present a valid API key with appropriate scopes to call tools.
buildtools.auth.enabled=false
# Authorization mode: 'permissive' (warn but allow), 'enforcing' (deny unauthorized calls)
buildtools.auth.mode=permissive
# Enable audit logging of tool invocations (default: true).
# Writes newline-delimited JSON to the audit log path.
buildtools.audit.enabled=true
# Path to the audit log file (default: ~/.buildtools/audit.log)
# buildtools.audit.path=/var/log/buildtools/audit.log

# API key configuration. Keys are specified via environment variables
# or system properties. Use the naming convention:
#   BUILDTOOLS_API_KEY_<NAME>=<key-value>
#   BUILDTOOLS_API_KEY_<NAME>_SCOPES=<comma-separated-scopes>
# Example:
#   BUILDTOOLS_API_KEY_AGENT1=sk-abc123
#   BUILDTOOLS_API_KEY_AGENT1_SCOPES=build:read,dependency:read
# Or via system properties:
#   buildtools.api.key.agent2=sk-xyz789
#   buildtools.api.key.agent2.scopes=build:read,build:execute
