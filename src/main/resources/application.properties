spring.application.name=@project.name@
# Default: stdio-only. Use --spring.profiles.active=http to enable HTTP.
spring.main.web-application-type=none
spring.ai.mcp.server.name=@project.name@ Server
spring.ai.mcp.server.version=@project.version@
spring.ai.mcp.server.stdio=true
# NOTE: this is essential else your client will barf!
spring.main.banner-mode=off
logging.pattern.console=
logging.level.org.springframework=WARN
# Allow unknown JSON fields in MCP protocol messages (Claude sends "extensions" field
# which is part of newer MCP spec but not recognized by Spring AI 1.0.0-M6's SDK)
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Streamable HTTP transport (opt-in via --spring.profiles.active=http) ──
# spring.ai.mcp.server.http=true
# server.port=8080

# ── Actuator health endpoints (available for monitoring) ──
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ── Streamable HTTP transport configuration ──
# CORS origins (comma-separated). Use "*" for development.
mcp.transport.cors.allowed-origins=*
# SSE stream timeout in milliseconds (default: 30 minutes)
mcp.transport.sse.timeout-ms=1800000
# Maximum number of concurrent SSE subscribers
mcp.transport.sse.max-subscribers=100
# Include timing info in response headers
mcp.transport.include-timing=true
