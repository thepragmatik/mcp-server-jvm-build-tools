# ── Streamable HTTP transport (activated via --spring.profiles.active=http) ──
# Overrides the default application.properties which sets
# spring.main.web-application-type=none (stdio-only). Activate this profile
# to start an embedded Tomcat (servlet-based) web server on port 8080.
spring.main.web-application-type=servlet
spring.ai.mcp.server.http=true
server.port=8080
