name: Deploy documentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/pages.yml
  workflow_dispatch:

# Least-privilege permissions for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; do not cancel an in-progress run
# so a deployment always completes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned to a full commit SHA (v7.0.0) for supply-chain safety.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        # Pinned to a full commit SHA (v6.2.0) for supply-chain safety.
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install MkDocs Material and plugins
        # Install pinned versions for reproducible, supply-chain-safe builds.
        run: pip install -r docs/requirements.txt

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Configure Pages
        # Pinned to a full commit SHA (v5.0.0) for supply-chain safety.
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        # Pinned to a full commit SHA (v5.0.0) for supply-chain safety.
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # Pinned to a full commit SHA (v5.0.0) for supply-chain safety.
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
