name: Deploy documentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/pages.yml
  workflow_dispatch:

# Least-privilege permissions for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; do not cancel an in-progress run
# so a deployment always completes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned to a full commit SHA (v4.3.1) for supply-chain safety.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        # Pinned to a full commit SHA (v5.6.0) for supply-chain safety.
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Install MkDocs Material and plugins
        # Install pinned versions for reproducible, supply-chain-safe builds.
        run: pip install -r docs/requirements.txt

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Configure Pages
        # Pinned to a full commit SHA (v5.0.0) for supply-chain safety.
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        # Pinned to a full commit SHA (v3.0.1) for supply-chain safety.
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # Pinned to a full commit SHA (v4.0.5) for supply-chain safety.
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
