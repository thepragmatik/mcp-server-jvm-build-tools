name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: JDK ${{ matrix.java }} — test + coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [21, 23, 25]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build, test, and verify coverage
        run: mvn -B verify --file pom.xml --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk-${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-jdk-${{ matrix.java }}
          path: |
            target/site/jacoco/
            target/jacoco.exec
          retention-days: 7

  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: License headers check
        run: mvn -B license:format --file pom.xml --no-transfer-progress
        continue-on-error: true

      - name: Compile with warnings
        run: mvn -B compile -Dmaven.compiler.showWarnings=true --file pom.xml --no-transfer-progress

