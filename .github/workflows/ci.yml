name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [21, 23, 25]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven
      # Spotless and SpotBugs are JDK-independent and are run authoritatively
      # once in the single-JDK `quality` job below. They are skipped here so the
      # cross-JDK runtime/test matrix never breaks on formatter/analyzer JDK
      # compatibility (they still run in a plain local `mvn verify`).
      - name: Build, test, and verify coverage
        run: ./mvnw -B verify --file pom.xml --no-transfer-progress -Dspotless.check.skip=true -Dspotbugs.skip=true
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk-${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 7
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-jdk-${{ matrix.java }}
          path: |
            target/site/jacoco/
            target/jacoco.exec
          retention-days: 7

  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: License headers check
        run: ./mvnw -B license:format --file pom.xml --no-transfer-progress
        continue-on-error: true
      - name: Spotless formatting check
        run: ./mvnw -B spotless:check --file pom.xml --no-transfer-progress
      # Compile once (surfacing compiler warnings) and run SpotBugs against that
      # output in a single Maven invocation to avoid compiling the project twice.
      - name: Compile (with warnings) and SpotBugs static analysis
        run: ./mvnw -B compile spotbugs:check -Dmaven.compiler.showWarnings=true --file pom.xml --no-transfer-progress
