name: Dependency Scan (OWASP)

# Scans the server's OWN dependencies for known vulnerabilities using the OWASP
# dependency-check Maven plugin (issue #78). This complements Dependabot
# (.github/dependabot.yml): Dependabot proposes upgrades, this job blocks merges
# that would ship a known-vulnerable dependency on a touched POM, and the weekly
# schedule catches CVEs published after a dependency was last changed.
#
# The scan lives in its own workflow (and behind the `owasp` Maven profile) so it
# never slows the cross-JDK build/test matrix in ci.yml. See
# docs/DEPENDENCY_MANAGEMENT.md for the full rationale.

on:
  # Weekly so newly-disclosed CVEs against unchanged dependencies are caught.
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:
  # On PRs that change the dependency surface, fail fast before merge.
  pull_request:
    branches: [main, staging]
    paths:
      - "pom.xml"
      - "owasp-suppressions.xml"
      - ".github/workflows/dependency-check.yml"
  push:
    branches: [main]
    paths:
      - "pom.xml"
      - "owasp-suppressions.xml"
      - ".github/workflows/dependency-check.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Allows uploading the SARIF report to the GitHub code-scanning dashboard.
  security-events: write

jobs:
  owasp:
    name: OWASP dependency-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      # Cache the NVD vulnerability database between runs so the scan does not
      # re-download the full feed every time (much faster, kinder to the NVD API).
      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-
      # NVD_API_KEY is optional: without it the scan still runs (just rate-limited
      # by the NVD API). Configure the repository secret to speed up downloads.
      - name: Run OWASP dependency-check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: >-
          ./mvnw -B -Powasp
          org.owasp:dependency-check-maven:check
          -Dnvd.api.key="$NVD_API_KEY"
          --file pom.xml --no-transfer-progress
      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
            target/dependency-check-report.sarif
          retention-days: 30
      - name: Upload SARIF to code scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: target/dependency-check-report.sarif
