site_name: MCP Server — JVM Build Tools
site_description: >-
  One Model Context Protocol (MCP) server that gives AI agents secure, unified
  access to Maven, Gradle, and SBT build tools on the JVM.
site_url: https://thepragmatik.github.io/mcp-server-jvm-build-tools/
repo_url: https://github.com/thepragmatik/mcp-server-jvm-build-tools
repo_name: thepragmatik/mcp-server-jvm-build-tools
edit_uri: edit/main/docs/
copyright: Licensed under the Apache License, Version 2.0.

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/hammer-wrench
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

# Harden internal-link checking. By default MkDocs 1.6 only verifies that a link's
# target *file* exists, not the `#fragment` (heading anchor) portion. The Reference
# pages rely on cross-page `#anchor` links, so we ask MkDocs to validate anchors:
# under `--strict` (used by CI and the Pages deploy) this `warn` is elevated to a
# build failure, so a future heading rename that breaks an anchor fails the build
# instead of silently shipping a dead link.
validation:
  links:
    anchors: warn

# Legacy / audit stand-alone docs kept in the repo for direct GitHub browsing; they
# use cross-document relative links (e.g. ../src/...) that are intentionally excluded
# from the site build. The MCP-RC audit notes (#85-#89) are grounding records browsed
# on GitHub; their reader-facing content is folded into the Reference pages below.
exclude_docs: |
  INDEX.md
  AUTHORIZATION.md
  DEPENDENCY_MANAGEMENT.md
  requirements.txt
  ARCHITECTURE.md
  BACKWARD_COMPAT.md
  CONFIGURATION.md
  MCP_INTEGRATION.md
  QUICKSTART.md
  TOOLS.md
  TROUBLESHOOTING.md
  mcp-2026-07-28-transport-audit.md
  mcp-2026-07-28-tool-schema-audit.md
  mcp-cacheable-result-gap.md
  mcp-trace-context-propagation.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/thepragmatik/mcp-server-jvm-build-tools
      name: Source on GitHub

nav:
  - User Guide:
      - Overview: user-guide/overview.md
      - Installation: user-guide/installation.md
      - Configuration: user-guide/configuration.md
      - Usage: user-guide/usage.md
      - Examples: user-guide/examples.md
  - Reference:
      - Architecture: reference/architecture.md
      - Tools / MCP API: reference/tools.md
      - Configuration Reference: reference/configuration.md
      - Security: reference/security.md
      - Design v1.1.0: reference/design-v1.1.0.md
      - Protocol Evidence: EVIDENCE.md
  - FAQ: FAQ.md
  - Project:
      - Mission: MISSION.md
      - Roadmap: ROADMAP.md
      - Workflow: WORKFLOW.md
      - Agent Guide: AGENTS.md
      - Release Notes: RELEASE_NOTES.md
      - Swarm Research: SWARM-RESEARCH.md
      - MCP Ecosystem: mcp-ecosystem-research-june-2026.md
